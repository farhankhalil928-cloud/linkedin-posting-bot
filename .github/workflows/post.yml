name: LinkedIn Content Engine

on:
  workflow_dispatch: # Keeps the manual "Run" button in GitHub
  schedule:
    # Runs at 16:00 UTC every day (which is exactly 9:00 PM UTC+5)
    - cron: '0 16 * * *'

jobs:
  post_to_linkedin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests google-genai

      - name: Run LinkedIn Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: python linkedin_engine.py
        
